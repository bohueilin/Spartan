name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Mock mode builds with zero credentials, so CI needs no secrets.
# Gradle tasks run serially (--max-workers=1): this Hilt/KSP project races on generated files.

jobs:
  unit:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests
        run: ./gradlew --no-daemon --max-workers=1 :app:testDebugUnitTest
      - name: Coverage report (Kover)
        run: ./gradlew --no-daemon --max-workers=1 :app:koverXmlReport
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-and-coverage-reports
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/reports/kover/

  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Lint (debug)
        run: ./gradlew --no-daemon --max-workers=1 :app:lintDebug
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

  assemble:
    name: Assemble debug + release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble debug
        run: ./gradlew --no-daemon --max-workers=1 :app:assembleDebug
      - name: Assemble release (unsigned, R8 full mode)
        run: ./gradlew --no-daemon --max-workers=1 :app:assembleRelease
      - name: Record APK sizes (informal budget — release should stay well under 8 MB)
        run: ls -la app/build/outputs/apk/debug/*.apk app/build/outputs/apk/release/*.apk
      - name: Compile instrumentation tests (run in the emulator job)
        run: ./gradlew --no-daemon --max-workers=1 :app:assembleDebugAndroidTest
      # R8 mapping for crash deobfuscation — archive with every versionCode (Play Vitals runbook).
      - uses: actions/upload-artifact@v4
        with:
          name: r8-mapping
          path: app/build/outputs/mapping/release/mapping.txt

  instrumentation:
    name: Instrumentation (emulator)
    runs-on: ubuntu-latest
    # Emulator jobs are slower and occasionally flaky on shared runners; they gate merges to main
    # but PR authors get fast signal from the JVM jobs above.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run androidTest (Room migrations, Compose smoke, a11y semantics)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          disable-animations: true
          script: ./gradlew --no-daemon --max-workers=1 :app:connectedDebugAndroidTest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumentation-report
          path: app/build/reports/androidTests/
