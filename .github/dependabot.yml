# Automated dependency CVE/version watch (docs/Spartan_Enhancements.md §5).
# Note: androidx.security:security-crypto is intentionally on 1.1.0-alpha06 — pin to the first
# stable release when one lands.
version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      androidx:
        patterns: ["androidx.*"]
      kotlin:
        patterns: ["org.jetbrains.kotlin*", "com.google.devtools.ksp"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
